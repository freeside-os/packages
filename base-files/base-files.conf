# /usr/lib/tmpfiles.d/base-files.conf
#
# Freeside Base Directory Layout & UsrMerge Redirections
# This file is parsed by systemd-tmpfiles to atomically establish root symlinks.

# Type  Path                            Mode  UID   GID   Age  Argument

# Standard UsrMerge Redirections
L+      /bin                            -     -     -     -    usr/bin
L+      /sbin                           -     -     -     -    usr/bin
L+      /lib                            -     -     -     -    usr/lib
L+      /lib64                          -     -     -     -    usr/lib

# Foundational Variable Workspaces
d       /var/log                        0755  root  root  -    -
d       /var/cache                      0755  root  root  -    -
d       /var/lib                        0755  root  root  -    -
d       /var/tmp                        1777  root  root  -    -

# OverlayFS Backing Directories for /etc (Persistent state storage)
d       /var/lib/freeside               0755  root  root  -    -
d       /var/lib/freeside/mutable-etc   0755  root  root  -    -
d       /var/lib/freeside/etc-work      0700  root  root  -    -
